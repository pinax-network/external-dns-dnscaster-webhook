# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: example-a-record
spec:
  endpoints:
    - dnsName: crds.dnstest.pinax.network
      recordType: A
      targets:
        - 1.1.1.1
      providerSpecific:
        - name: webhook/dnscaster-ip-monitor-uri-scheme
          value: ping
        - name: webhook/dnscaster-ip-monitor-treat-redirects-as-offline
          value: "true"
