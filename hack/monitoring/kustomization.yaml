apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: external-dns-dnscaster-dashboard
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
    files:
      - ./dashboard.json
  - name: dnscaster-monitors-overview
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
    files:
      - ./dnscaster-monitors-overview.json
