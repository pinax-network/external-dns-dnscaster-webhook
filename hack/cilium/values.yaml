cluster:
  name: local
ipam:
  mode: kubernetes
ipv4:
  enabled: true
ipv6:
  enabled: true

l7Proxy: true
l2announcements:
  enabled: true
endpointRoutes:
  enabled: true

# KPR needed for cilium LB
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

# Cilium service mesh
ingressController:
  enabled: true
  default: true
  loadBalancerMode: dedicated
gatewayAPI:
  enabled: true
  gatewayClass:
    create: "true"

operator:
  replicas: 1
  rollOutPods: true
rollOutCiliumPods: true

securityContext:
  privileged: true
  capabilities:
    ciliumAgent:
      - PERFMON
      - BPF
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUI
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
